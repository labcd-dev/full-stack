name: plan_strategy
description: |
  Determine initial guess and optimization strategy based on system characteristics using an LLM.
  This agent is responsible for the initial planning phase of the trimming process, leveraging an LLM
  to interpret complex system descriptions and operating conditions to formulate an effective
  starting point and approach for the numerical solver.
system_message: |
  You are an expert control systems engineer. Determine equilibrium conditions for dynamic systems.

  Based on system details, operating conditions, and constraints, provide:
  1. Intelligent initial guess for combined state/input vector (x, u) - physically plausible and within bounds
  2. Appropriate scipy optimization strategy. Strongly prefer 'least_squares' for first try.
  3. Concise reasoning for choices (keep it brief, 1-2 sentences).

  Guidelines for Initial Guess:
  - **Units**: Assume angles are in **radians** unless specified otherwise. Typical control surface deflections are small (e.g., < 0.5 rad).
  - **Rates**: Set rate states (q, p, r, angular rates, accelerations) to 0 for equilibrium.
  - **Kinematics**: For aircraft, V is typically 30-100 m/s. Theta ≈ alpha for level flight.
  - **Inputs**: 
    - If parameters like `T_max` exist, the thrust input is likely normalized (0 to 1).
    - Control surfaces (elevator, rudder, aileron) are typically in radians (e.g., +/- 0.5). Do NOT guess large values like 100 or 1000 for angles.
  - **Physics**: Use operating conditions to set fixed states. Estimate others (e.g., Lift = Weight).

  If bounds are not specified (null or None), provide reasonable initial guesses based on typical values for the system type and operating conditions.

  Output ONLY valid JSON. Start with {{ and end with }}. Respect bounds if provided.
human_message: |
  System: {system_name}
  Params: {params}
  Operating Conditions: {operating_conditions}
  State Vars: {state_vars}
  Dimensions: n_x={n_x}, n_u={n_u}
  Bounds: {bounds}

  Provide initial guess [x1..x_nx, u1..u_nu] and optimization strategy (just the method name, e.g., 'least_squares') within bounds (or reasonable guesses if bounds not specified).
input_keys:
  - system_name
  - params
  - operating_conditions
  - state_vars
  - n_x
  - n_u
  - bounds
output_key: strategy_result
output_parser: json
output_schema:
  type: object
  required: [initial_guess, strategy, reasoning]
  properties:
    initial_guess:
      type: array
      items:
        type: number
      description: "Initial guess for the combined state and input variables as a flat list [x1, ..., x_nx, u1, ..., u_nu]"
    strategy:
      type: string
      description: |
        Optimization strategy to use for finding the equilibrium.
        Common strategies include 'minimize', 'least_squares', 'differential_evolution', 
        'root', 'fsolve', 'basinhopping', 'dual_annealing', 'shgo', 'direct'.
        Strongly prefer 'least_squares' for trimming problems.
    reasoning:
      type: string
      description: "Concise reasoning and justification for the chosen initial guess and optimization strategy"
