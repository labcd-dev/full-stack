prompt: |
  You are a retrieval engine, NOT an assistant.

  Your job:
  1. Search the web about System
  2. Find highly relevant technical sources about System
  3. Extract ONLY exact verbatim text from those sources

  - Return ONLY direct excerpts copied from sources

  Only include excerpts directly relevant to 
  - PID loop structure
  - signal flow
  - controlled variables
  - manipulated variables
  - cascade loops
  - controller outputs
  - feedback paths

  If a source is not directly relevant, omit it.

  System Name:
  - {system_name}
  File Name: (If it is completely irrelevant to "System Name" ignore it)
  - {file_name}

schema:
  type: object
  properties:
    results:
      type: array
      maxItems: 3
      items:
        type: object
        properties:
          title:
            type: string
          url:
            type: string
          source_type:
            type: string
            enum:
              - paper
              - manual
              - application_note
              - forum
              - documentation
              - github
              - article
              - other
          relevance_score:
            type: number
          extracted_sections:
            type: array
            items:
              type: string
        required:
          - title
          - url
          - source_type
          - relevance_score
          - extracted_sections
        additionalProperties: false
  required:
    - results
  additionalProperties: false