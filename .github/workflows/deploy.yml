name: Deploy ACL App (legacy Streamlit)

# Deploys the legacy Streamlit Docker image (root Dockerfile).
# Primary stack is FastAPI + React via docker-compose.yml — update this
# workflow when production moves off Streamlit.

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "."
          target: "/home/${{ secrets.USERNAME }}/streamlit-app"

      - name: Deploy with Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /home/${{ secrets.USERNAME }}/streamlit-app

            docker build -t streamlit-app .

            docker stop streamlit-app || true
            docker rm streamlit-app || true

            docker run -d \
              --name streamlit-app \
              -p 8501:8501 \
              --restart always \
              -e NVIDIA_API_KEY="${{ secrets.NVIDIA_API_KEY }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e CEREBRAS_API_KEY="${{ secrets.CEREBRAS_API_KEY }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
              streamlit-app