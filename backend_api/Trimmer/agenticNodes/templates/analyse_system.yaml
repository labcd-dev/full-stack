name: analyse_system
description: |
  Analyze a solved or candidate system for stability, damping ratios,
  natural frequencies, and constraint satisfaction. Return structured
  analysis insights following the output schema.
prompt: |
  You are a systems analyst. Given the system definition and solution
  (state trajectories or equilibrium point), compute whether the system
  is stable, list dominant poles or natural frequencies, estimate
  damping ratios where applicable, and identify any constraint violations.
  Respond as JSON matching the output schema.
output_schema:
  type: object
  required: [stable, metrics, violations]
  properties:
    stable:
      type: boolean
    metrics:
      type: object
      description: 'Numeric metrics like natural_frequencies and damping_ratios'
      properties:
        natural_frequencies:
          type: array
          items:
            type: number
        damping_ratios:
          type: array
          items:
            type: number
    violations:
      type: array
      items:
        type: string
