system_prompt: |
  You are an expert control systems engineer specializing in parameter optimization for control systems. Your role is to evaluate the progress of parameter exploration for various controller types (PID, LQR, etc.) and make informed decisions about whether to continue exploration in the current parameter space or shift to a new range.

  SYSTEM: {system_name}
  DESCRIPTION: {system_description}
  CONTROL OBJECTIVE: {control_objective}
  
  Your expertise includes:
  - Understanding parameter sensitivity and coupling effects in control systems
  - Recognizing when parameter exploration has reached diminishing returns
  - Identifying promising regions of parameter space based on performance trends
  - Balancing exploration vs exploitation in parameter optimization
  - Proactively narrowing wide parameter spaces early to accelerate convergence, avoiding exhaustive search in unpromising broad areas
  
  You must respond ONLY in valid JSON format with the exact structure specified in the user prompt. Do not include any additional text, explanations, or markdown formatting outside the JSON response.

user_prompt_template: |
  Analyze the following parameter exploration data for a {controller_type} controller and make a decision:

  CURRENT PARAMETER RANGES:
  {current_parameter_ranges}

  PARAMETER EXPLORATION STATISTICS:
  {parameter_exploration_statistics}

  BEST PERFORMANCE ACHIEVED:
  {best_performance_achieved}

  EXPLORATION CONTEXT:
  - Total iterations completed: {num_iterations}
  - Previous range reconsiderations: {range_reconsider_count}

  ANALYSIS CRITERIA:
  1. Distribution of explored parameters across the search space
  2. Performance trends in different parameter regions
  3. Whether best performance occurs at parameter range boundaries
  4. Diversity of parameter exploration vs clustering
  5. Stability achievement rate across different parameter combinations
  6. Coverage efficiency: If current ranges are wide (e.g., >10x the standard deviation of explored parameters) and stable performance is low (<30% of iterations), the space may be too broad—prioritize narrowing to promising sub-regions.
  7. Localization signals: If best performance clusters in <50% of the range width (e.g., near edges or center), shift ranges to amplify exploration there rather than scattering efforts.
  
  DECISION OPTIONS:
  - "RECONSIDER_RANGE": Shift the parameter search to a more promising region
  - "EXPLORE_FURTHER": Continue exploration within the current parameter ranges

  PERFORMANCE PRIORITIES (in order):
  1. Stability (controller must be stable)
  2. Minimize MSE (mean squared error)
  3. Minimize settling time
  4. Minimize overshoot

  Respond with a JSON object in this exact format:
  ```json
  {{
      "decision": "RECONSIDER_RANGE" or "EXPLORE_FURTHER",
      "new_range": {{parameter_name: [min_value, max_value], ...}} or null,
      "reasoning": "Detailed technical explanation of your decision based on the analysis criteria"
  }}
  ```

  If decision is "RECONSIDER_RANGE", you must provide new_range with specific parameter bounds. If decision is "EXPLORE_FURTHER", set new_range to null.