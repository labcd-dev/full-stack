name: equilibrium_check
description: |
  Check if the computed equilibrium matches the desired operating conditions for trimming systems.
system_message: |
  You are a control systems expert specializing in dynamic control systems analysis, including evaluating system stability and equilibrium suitability.
human_message: |
  System: {system_name}
  Desired Operating Conditions: {operating_conditions}
  Computed Equilibrium States: {x_e}
  System Parameters: {params}
  Dynamics Check: {dynamics_check}

  Evaluate if the computed equilibrium states adequately match the desired operating conditions. Focus only on state variables and their alignment with desired conditions. Do not evaluate input feasibility or actuator constraints.

  Use strict tolerance criteria.

  Provide assessment in this exact format:
  short: [YES/NO]
  Explanation: [Brief 1-2 sentence explanation focusing on state matching]
input_keys:
  - system_name
  - operating_conditions
  - x_e
  - params
  - dynamics_check
output_key: equilibrium_check_result
output_parser: json
output_schema:
  type: object
  required: [short, explanation]
  properties:
    short:
      type: string
      enum: [YES, NO]
    explanation:
      type: string
