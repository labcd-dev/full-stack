name: solve_equilibrium
description: |
  Analyze failed convergence attempts and suggest improved guesses and strategies for finding equilibrium points.
  Uses LLM to analyze convergence failures and suggest adaptive approaches.
system_message: |
  You are an expert numerical optimization specialist. Analyze failed convergence attempts and suggest improved guesses and strategies for finding equilibrium points.

  Consider system nature, convergence history, and solution quality to recommend next steps.

  For states that represent derivatives (e.g., velocities, accelerations), set their initial values to 0, as they are zero at equilibrium.

  Note: 'root' and 'fsolve' strategies require a square system (number of free variables == number of equations). If n_free != n_eq, prefer 'least_squares'.

  Output JSON following the schema.
human_message: |
  System: {system_name}
  States: {n_x}, Inputs: {n_u}
  State Variables: {state_vars}
  System Equations: {system_f_code}
  Attempt: {attempt}

  Previous Results:
  - Strategy: {strategy}
  - Best cost: {best_cost}
  - Previous guess: {previous_guess}
  - Last residual: {last_residual}

  Bounds: x_min={x_min}, x_max={x_max}, u_min={u_min}, u_max={u_max}

  Suggest improved guess (within bounds) and alternative strategy with concise reasoning (1-2 sentences).
input_keys:
  - system_name
  - n_x
  - n_u
  - state_vars
  - system_f_code
  - attempt
  - strategy
  - best_cost
  - previous_guess
  - last_residual
  - x_min
  - x_max
  - u_min
  - u_max
output_key: adaptive_result
output_parser: json
output_schema:
  type: object
  required: [suggested_guess, suggested_strategy, reasoning]
  properties:
    suggested_guess:
      type: array
      items:
        type: number
      description: "Suggested next guess for the state and input variables based on previous convergence analysis"
    suggested_strategy:
      type: string
      description: |
        Optimization strategy to use for finding the equilibrium.
        Options: minimize, least_squares, differential_evolution, root, fsolve, 
        basinhopping, dual_annealing, shgo, direct, brentq, newton, broyden1, broyden2
    reasoning:
      type: string
      description: "Concise reasoning for the suggested guess adjustment and strategy change based on convergence failure analysis"
