analyse_system: |
  I have a system dynamics equation from a MATLAB file in either state-space or transfer function form or even dynamic equations.
  Please analyze the following system and provide a structured JSON response:

  Your Task:
  1. Understand the equations inside matlab file what each symbol related to what dynamic variable in real world. what is this equations
  try to tell beside each other and how they describe system dynamics.
  2. The controller inputs (like motor angular velocity, voltage, etc.).
  3. outputs (maximum set of variables that can be directly measured in real world with sensors and latter can be used for comparing to set point and 
    designing a proper controller system)
  4. State variables (minimum set of variables that are able to fully describe state of system)
  5. If the system has a transfer function, provide it.

  this is the matlab file content you can also pass it to derive_state_space in order to drive state_space:
  {equation}

  Please **ONLY** return the output in the **following JSON format** without any extra text:

  {{
    "system_name": "<JUST the name of phyical object without ANY extra text>",
    "description": "<Brief description of the system which states are controlled by what controller input?>",
    "system_properties": {{
      "continuous": "Continuous/Discreate",
      "linear": "Linear/Nonlinear",
      "order": integer,
      "type": "SISO/MIMO",
      "n_states": "number of states",
      "n_inputs":"number of controller inputs",
    }},
    "inputs": [
      {{
        "physical_meaning": "actuator_command_description",
        "variable_name": "variable_name",
        "variable_in_equation": "ONLY <U[0]/U[1]/...> should be in this part nothing extra.",
        "unit": "Should driven from equation directly"
      }}
    ],
    "outputs": [
      {{
        "physical_meaning": "measurable_quantity_description",
        "variable_in_equation": "ACTUAL MEASURED VARIABLE (not necessarily X[n])",
        "unit": "Should driven from equation directly"
      }}
    ],
    "state_variables": [
      {{
        "physical_meaning": "describes what actually this state mean in physical world", 
        "variable_name": "variable_name",
        "variable_in_equation": "ONLY <X[0]/X[1]/...> should be in this part nothing extra.",
        should be present in this field.",
        "unit": "Should driven from equation directly"
      }}
    ]
  }}

  CRITICAL REQUIREMENTS:
      1. Format of "variable_in_equation" in "inputs", "outputs" and "state_variables" are extremly important. Always put numbers inside brackets.