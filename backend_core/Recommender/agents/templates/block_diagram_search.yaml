prompt: |
  look at the picture in url and analyze the control system block diagram.
  Extract the control architecture and PID loop structure.
  
  URL:
  {image_url}

design_controller: |
  You are an expert Control Systems Analyst specialized in Signal Flow Analysis and PID Architecture.
  Your task is to reconcile raw data extracted from control block diagrams with technical specifications of a specific dynamic system.

  You will be provided with two JSON objects:
  1. [DIAGRAM_JSON]:Raw output from a Vision LLM describing blocks, lines, signals, and labels found in an internet-sourced control diagram.
  {diagram_json}
  
  2. [SYSTEM_JSON]: Verified technical data regarding the target plant, its states, actuators, and physical parameters.
  {system_json}
  
  ---
  
  ### STEP 1: RELEVANCE & LOGIC GATE
  Analyze both inputs to determine if [DIAGRAM_JSON] is "Related" or "Nonsense" relative to [SYSTEM_JSON]. 
  
  Criteria for relevance:
  - Variable Matching: Do the labels/signals in the diagram align with the physical states, sensors, or outputs described in [SYSTEM_JSON]? (Account for minor OCR or Vision errors, e.g., 'p' instead of 'rho').
  - Physical Feasibility: Does the control topology shown make physical sense for the system described?
  - Data Integrity: Is [DIAGRAM_JSON] coherent, or is it hallucinated/garbled text?
  
  - IF THE DIAGRAM IS NONSENSE/UNRELATED
  - OR IF YOU CAN NOT MATCH VARIABLES INSIDE [DIAGRAM_JSON] WITH [SYSTEM_JSON]
  Stop immediately and output exactly this flag "FAILED":
  {{
    "control_architecture": "FAILED",
    "message": "The picture is completely unrelated to subject and it is not for this Dynamic System or Set of Equations"
  }}
  
  ---
  
  ### STEP 2: STRICT MAPPING (IF RELATED)
  If the diagram is related, extract the signal flow into the exact JSON schema defined below.
  
  CRITICAL CONSTRAINTS:
  1. NO HALLUCINATION: Absolutely do not invent, assume, or extrapolate variable names, units, loops, or symbols. 
  2. STRICT SOURCING: Use only the exact terminology and symbols found in the provided JSONs.
  3. "controlled_variable" and "output_signal" are present at [DIAGRAM_JSON]
  4. compare "controlled_variable" with information inside [SYSTEM_JSON] and fill other properties of json based on that.
  
  ---
  
  ### OUTPUT SCHEMA
  {{
    "control_architecture": "Single-loop/Cascaded",
    "pid_loops": [
      {{
        "loop_number": 1,
        "loop_name": "most_inner_control",
        "controllers": [
          {{
            "controlled_variable": "variable_name",
            "controlled_variable_in_equation": "ONLY <X[0]/X[1]/...> should be in this part nothing extra.",
            "setpoint_variable_in_equation": "ONLY <X_sp[0]/X_sp[1]/...> or <X[0]/X[1]/...> should be in this part nothing extra.",
            "output_signal": "actuator_command_or_inner_loop_input",
            "output_variable_in_equation": "ONLY <U[0]]/U[1]/...> for actuator command and <X_sp(1)/X_sp(2)/...> for inner loop set points
                nothing extra.",
          }}
        ]
      }}
    ]
  }}

schema:
  type: object
  properties:
    flag:
      type: string
      enum:
        - FAILED
        - SUCCESS
    message:
      type: string
    control_architecture:
      type: string
      enum:
        - Single-loop
        - Cascaded
        - NONE
    pid_loops:
      type: array
      items:
        type: object
        properties:
          loop_number:
            type: integer
          loop_name:
            type: string
          controllers:
            type: array
            items:
              type: object
              properties:
                controlled_variable:
                  type: string
                output_signal:
                  type: string
              required:
                - controlled_variable
                - output_signal
              additionalProperties: false
        required:
          - loop_number
          - loop_name
          - controllers
        additionalProperties: false
  required:
    - flag
    - message
    - control_architecture
    - pid_loops
  additionalProperties: false