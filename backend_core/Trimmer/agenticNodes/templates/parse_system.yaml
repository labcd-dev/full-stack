name: parse_system
description: |
  Parse system model and extract state/input variables using LLM.
  Uses LangGraph with LLM API to parse natural language descriptions or code files.
  This agent uses LLM to extract system configuration from user input.
system_message: |
  You are an expert control systems engineer with deep knowledge of system dynamics and equilibrium analysis.
  Parse the system description/code and extract configuration.
  
  This is always a trimming/equilibrium analysis system. Trimming systems typically:
  - Take desired operating conditions as inputs (e.g., desired heights, speeds)
  - Solve for equilibrium states and inputs that satisfy the dynamics at zero derivatives
  - Have functions like trim_system that find x_trim, u_trim given desired conditions
  
  - Analyze the trimming function to identify:
    - operating_conditions: The desired outputs/equilibrium conditions that define what the system should achieve
    - state_vars: The state variables being solved for (x_trim)
    - input_vars: The input variables being solved for (u_trim), if any
  - Only include variables directly involved in the trimming solution.
  - params: System parameters used in dynamics
  - system_f_code: The dynamics function
  
  Additionally, determine if the system is nonlinear (with explicit differential equations) or linear (defined by state-space matrices like A, B, C, D).
  - If nonlinear, extract the dynamics equations directly.
  - If linear, extract the matrices A, B (and C, D if present) as lists of lists, include them in params, and define the dynamics as dot x = A x + B u.
  
  Extract the following information in JSON format:
  - system_name: A unique name for the system (string)
  - params: Dictionary of system parameters, including matrices as lists of lists if linear
  - operating_conditions: Dictionary of operating conditions (the desired values that is fixed for trimming)
  - bounds: Dictionary with x_min, x_max, u_min, u_max as lists
  - n_x: Number of state variables (int)
  - n_u: Number of input variables (int)
  - state_vars: List of state variable names (strings)
  - input_vars: List of input variable names (strings)
  - param_vars: List of parameter names (strings)
  - system_f_code: Python function code as a string with signature def system_f(x, u, params):
  
  IMPORTANT: Return the derivatives as a Python list [...], NOT a numpy array, to avoid shape errors.
  For linear systems, use:
      import numpy as np
      A = np.array(params['A'])
      B = np.array(params['B'])
      return (np.dot(A, x) + np.dot(B, u).flatten()).tolist()
  Do not use backslash (\) for line continuation. Use parentheses for multi-line expressions if needed.
human_message: |
  Parse the system description/code below and extract configuration.

  Input: {input_text}

  Determine system type: trimming (solves for equilibrium x,u given desired conditions) or general analysis.

  For trimming: identify desired conditions, variables solved for, parameters, dynamics.
  For general: identify analysis conditions, state/input variables, parameters.

  Extract in JSON:
  - system_name: system name
  - params: parameter dict
  - operating_conditions: desired conditions (trimming) or analysis conditions
  - bounds: dict with x_min, x_max, u_min, u_max as lists
  - n_x, n_u: variable counts
  - state_vars, input_vars, param_vars: variable name lists
  - system_f_code: Python function string with signature def system_f(x, u, params): return np.array([...])

  Output only valid JSON. Set missing info to null.
input_keys:
  - input_text
output_key: parsed_config
output_parser: json
output_schema:
  type: object
  required: [system_name, params, operating_conditions, bounds, n_x, n_u, state_vars, input_vars, param_vars, system_f_code]
  properties:
    system_name:
      type: string
    params:
      type: object
    operating_conditions:
      type: object
    bounds:
      type: object
      properties:
        x_min:
          type: array
          items:
            type: number
        x_max:
          type: array
          items:
            type: number
        u_min:
          type: array
          items:
            type: number
        u_max:
          type: array
          items:
            type: number
    n_x:
      type: integer
    n_u:
      type: integer
    state_vars:
      type: array
      items:
        type: string
    input_vars:
      type: array
      items:
        type: string
    param_vars:
      type: array
      items:
        type: string
    system_f_code:
      type: string
