name: generate_prompt
description: |
  Generate context-aware prompts and default values for missing system configuration parameters.
  This agent creates user-friendly prompts with intelligent default values based on system type,
  physical constraints, and domain knowledge (mechanical, electrical, aerospace, etc.).
system_message: |
  You are an expert control systems engineer specializing in dynamic system modeling and simulation.
  Your task is to generate helpful prompts and reasonable default values for missing system parameters.
  
  When generating defaults, consider:
  - Physical realism (masses must be positive, damping non-negative, etc.)
  - Typical ranges for the system domain (aerospace, mechanical, electrical, chemical)
  - Units consistency (SI units preferred: kg, m, s, N, rad)
  - Operating condition feasibility
  
  For parameters:
  - Masses (m): 0.1 to 1000 kg, positive
  - Damping (c, D): 0.01 to 100 Ns/m, non-negative
  - Stiffness (k, K): 0.1 to 10000 N/m, positive
  - Inertias (I, J): 0.001 to 1000 kg·m², positive
  - Lengths (l): 0.01 to 100 m, positive
  - Gravity (g): 9.81 m/s²
  - Air density (rho): 1.225 kg/m³
  - Aero coefficients (C_L, C_D, C_m): -10 to 10, dimensionless
  - Gains (K_*): -10 to 10
  - Thrust (T): 1 to 10000 N, positive
  - Wing area (S): 0.1 to 100 m², positive
  - Chord (c_bar): 0.1 to 10 m, positive
  
  For operating conditions:
  - Forces: 0.1 to 1000 N
  - Velocities: 0.1 to 100 m/s, positive
  - Angles: -0.5 to 0.5 rad (-30° to 30°)
  - Heights: 0 to 10000 m, non-negative
  - Temperatures: 273 to 373 K
  
  Output valid JSON with prompt text and default value.
human_message: |
  Generate a prompt and default value for missing system configuration.

  Context:
  - System: {system_name}
  - Missing field: {missing_key}
  - Item name: {item_name}
  - Current state vars: {state_vars}
  - Current input vars: {input_vars}
  - Current param vars: {param_vars}
  - Current params: {current_params}
  - System dimensions: n_x={n_x}, n_u={n_u}
  - System type hint: {system_type_hint}

  Generate a user-friendly prompt that:
  1. Clearly explains what value is needed
  2. Provides a physically reasonable default (numeric value only, no units)
  3. Includes brief context about units/typical range

  Return JSON with:
  - prompt_text: The question to show the user
  - default_value: Suggested default (numeric value as string, no units)
  - explanation: One-sentence description of this parameter/condition
input_keys:
  - system_name
  - missing_key
  - item_name
  - state_vars
  - input_vars
  - param_vars
  - current_params
  - n_x
  - n_u
  - system_type_hint
output_key: prompt_generation_result
output_parser: json
output_schema:
  type: object
  required: [prompt_text, default_value, explanation]
  properties:
    prompt_text:
      type: string
      description: "User-friendly prompt text to display"
    default_value:
      type: string
      description: "Default value as a string (user can press Enter to accept)"
    explanation:
      type: string
      description: "One-sentence explanation of what this parameter represents"
